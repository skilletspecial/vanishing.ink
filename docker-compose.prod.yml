services:
  app:
    build: .
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=80
      - MAX_NOTE_BYTES=${MAX_NOTE_BYTES:-102400}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-10}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-3600000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.vanishing-ink.rule=Host(`vanishing.ink`)
      - traefik.http.routers.vanishing-ink.entrypoints=websecure
      - traefik.http.routers.vanishing-ink.tls.certresolver=le
      - traefik.http.services.vanishing-ink.loadbalancer.server.port=80
    networks:
      - default
      - proxy

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:

networks:
  proxy:
    external: true
